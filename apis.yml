        type: Authentication
      - url: https://developer.vanta.com/docs/faq
        type: FAQ
      - url: https://raw.githubusercontent.com/api-evangelist/vanta/refs/heads/main/openapi/vanta-openapi.yml
        type: OpenAPI
    description: >-
      The Vanta REST API enables programmatic access to compliance, security monitoring, vulnerability management,
      personnel management, vendor management, and custom integration capabilities. The API uses OAuth 2.0
      authentication and returns JSON responses. Rate limits range from 5 to 250 requests per minute depending on
      endpoint category.
  - aid: vanta:vanta-auditor-api
    name: Vanta Auditor API
    tags:
      - Cybersecurity
      - Compliance
      - Audit
      - Security
    humanURL: https://developer.vanta.com/docs/vanta-api-overview
    baseURL: https://api.vanta.com
    properties:
      - url: https://developer.vanta.com/docs/vanta-api-overview
        type: Documentation
      - url: https://raw.githubusercontent.com/api-evangelist/vanta/refs/heads/main/openapi/vanta-auditor-openapi.yml
        type: OpenAPI
    description: >-
      The Vanta Auditor API provides external audit firms programmatic access to customer compliance data. Auditors can
      query audits, vendors, monitored computers, people, vulnerabilities, evidence, controls, and comments during audit
      engagements.
