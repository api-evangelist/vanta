description: >-
  Vanta is a trust management platform that automates security compliance for frameworks including SOC 2, ISO 27001,
  HIPAA, PCI DSS, and GDPR. The Vanta API enables organizations to programmatically manage their compliance posture,
  automate security monitoring, manage vulnerabilities, track controls, manage vendors, and integrate with existing
  tools and workflows.
