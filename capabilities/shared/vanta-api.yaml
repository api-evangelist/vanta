naftiko: "1.0.0-alpha1"

info:
  label: "Vanta API"
  description: >-
    Vanta REST API for managing security compliance posture, including vulnerability
    tracking, control management, vendor security reviews, personnel management,
    and custom integrations for SOC 2, ISO 27001, HIPAA, PCI DSS, and GDPR.
  tags:
    - Vanta
    - Cybersecurity
    - Compliance
    - Security
    - Governance
    - Risk Management
  created: "2026-05-03"
  modified: "2026-05-03"

binds:
  - namespace: env
    keys:
      VANTA_ACCESS_TOKEN: VANTA_ACCESS_TOKEN

capability:
  consumes:
    - type: http
      namespace: vanta
      baseUri: https://api.vanta.com
      description: "Vanta compliance management API"
      authentication:
        type: bearer
        token: "{{VANTA_ACCESS_TOKEN}}"
      resources:
        - name: users
          path: /v1/users
          description: "Active user management"
          operations:
            - name: list-users
              method: GET
              description: "List active users in the organization"
              inputParameters:
                - name: pageSize
                  in: query
                  type: integer
                  required: false
                  description: "Number of items per page (1-100)"
                - name: pageCursor
                  in: query
                  type: string
                  required: false
                  description: "Pagination cursor"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: people
          path: /v1/people
          description: "Personnel management and security task tracking"
          operations:
            - name: list-people
              method: GET
              description: "List people with employment status and training completion"
              inputParameters:
                - name: pageSize
                  in: query
                  type: integer
                  required: false
                  description: "Number of items per page"
                - name: pageCursor
                  in: query
                  type: string
                  required: false
                  description: "Pagination cursor"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: vulnerabilities
          path: /v1/vulnerabilities
          description: "Vulnerability tracking and remediation"
          operations:
            - name: list-vulnerabilities
              method: GET
              description: "List all vulnerabilities with severity and SLA filters"
              inputParameters:
                - name: severity
                  in: query
                  type: string
                  required: false
                  description: "Filter by severity (CRITICAL, HIGH, MEDIUM, LOW)"
                - name: status
                  in: query
                  type: string
                  required: false
                  description: "Filter by status (OPEN, REMEDIATED, ACCEPTED)"
                - name: pageSize
                  in: query
                  type: integer
                  required: false
                  description: "Number of items per page"
                - name: pageCursor
                  in: query
                  type: string
                  required: false
                  description: "Pagination cursor"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: controls
          path: /v1/controls
          description: "Compliance controls and framework management"
          operations:
            - name: list-controls
              method: GET
              description: "Query compliance controls with status and framework filters"
              inputParameters:
                - name: frameworkId
                  in: query
                  type: string
                  required: false
                  description: "Filter by framework identifier"
                - name: status
                  in: query
                  type: string
                  required: false
                  description: "Filter by control status"
                - name: pageSize
                  in: query
                  type: integer
                  required: false
                  description: "Number of items per page"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: frameworks
          path: /v1/frameworks
          description: "Compliance framework management"
          operations:
            - name: list-frameworks
              method: GET
              description: "List all configured compliance frameworks"
              inputParameters:
                - name: pageSize
                  in: query
                  type: integer
                  required: false
                  description: "Number of items per page"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: tests
          path: /v1/tests
          description: "Automated compliance test results"
          operations:
            - name: list-tests
              method: GET
              description: "Query and filter automated compliance test results"
              inputParameters:
                - name: status
                  in: query
                  type: string
                  required: false
                  description: "Filter by test status (PASS, FAIL, DISABLED, NA)"
                - name: frameworkId
                  in: query
                  type: string
                  required: false
                  description: "Filter tests by framework"
                - name: pageSize
                  in: query
                  type: integer
                  required: false
                  description: "Number of items per page"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: documents
          path: /v1/documents
          description: "Compliance evidence document management"
          operations:
            - name: list-documents
              method: GET
              description: "Retrieve compliance evidence documents"
              inputParameters:
                - name: pageSize
                  in: query
                  type: integer
                  required: false
                  description: "Number of items per page"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: upload-document
              method: POST
              description: "Upload a compliance evidence document"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: vendors
          path: /v1/vendors
          description: "Third-party vendor security review management"
          operations:
            - name: list-vendors
              method: GET
              description: "Query vendors and security review information"
              inputParameters:
                - name: riskLevel
                  in: query
                  type: string
                  required: false
                  description: "Filter by risk level (CRITICAL, HIGH, MEDIUM, LOW)"
                - name: pageSize
                  in: query
                  type: integer
                  required: false
                  description: "Number of items per page"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-vendor
              method: POST
              description: "Create a new vendor for security review tracking"
              body:
                type: json
                data:
                  name: "{{tools.name}}"
                  url: "{{tools.url}}"
                  riskLevel: "{{tools.riskLevel}}"
                  description: "{{tools.description}}"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: vendor-detail
          path: /v1/vendors/{vendorId}
          description: "Individual vendor management"
          operations:
            - name: get-vendor
              method: GET
              description: "Get vendor details and security review status"
              inputParameters:
                - name: vendorId
                  in: path
                  type: string
                  required: true
                  description: "Vendor identifier"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: update-vendor
              method: PATCH
              description: "Update vendor security review information"
              inputParameters:
                - name: vendorId
                  in: path
                  type: string
                  required: true
                  description: "Vendor identifier"
              body:
                type: json
                data:
                  riskLevel: "{{tools.riskLevel}}"
                  reviewStatus: "{{tools.reviewStatus}}"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: resources
          path: /v1/resources
          description: "Monitored resource scoping"
          operations:
            - name: list-resources
              method: GET
              description: "List all monitored resources in compliance scope"
              inputParameters:
                - name: resourceType
                  in: query
                  type: string
                  required: false
                  description: "Filter by resource type"
                - name: pageSize
                  in: query
                  type: integer
                  required: false
                  description: "Number of items per page"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: computers
          path: /v1/computers
          description: "Endpoint device compliance monitoring"
          operations:
            - name: list-computers
              method: GET
              description: "List monitored computers with compliance status"
              inputParameters:
                - name: complianceStatus
                  in: query
                  type: string
                  required: false
                  description: "Filter by compliance status (COMPLIANT, NON_COMPLIANT)"
                - name: pageSize
                  in: query
                  type: integer
                  required: false
                  description: "Number of items per page"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: integrations
          path: /v1/integrations
          description: "Integration configuration management"
          operations:
            - name: list-integrations
              method: GET
              description: "List all configured integrations and their status"
              inputParameters:
                - name: pageSize
                  in: query
                  type: integer
                  required: false
                  description: "Number of items per page"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8100
      namespace: vanta-rest
      resources:
        - path: /v1/users
          name: users
          description: "Active user management"
          operations:
            - method: GET
              name: list-users
              description: "List active users"
              call: "vanta.list-users"
              with:
                pageSize: "rest.pageSize"
                pageCursor: "rest.pageCursor"
              outputParameters:
                - type: object
                  mapping: "$."

        - path: /v1/vulnerabilities
          name: vulnerabilities
          description: "Vulnerability management"
          operations:
            - method: GET
              name: list-vulnerabilities
              description: "List vulnerabilities"
              call: "vanta.list-vulnerabilities"
              with:
                severity: "rest.severity"
                status: "rest.status"
              outputParameters:
                - type: object
                  mapping: "$."

        - path: /v1/vendors
          name: vendors
          description: "Vendor management"
          operations:
            - method: GET
              name: list-vendors
              description: "List vendors"
              call: "vanta.list-vendors"
              outputParameters:
                - type: object
                  mapping: "$."
            - method: POST
              name: create-vendor
              description: "Create vendor"
              call: "vanta.create-vendor"
              with:
                name: "rest.name"
                url: "rest.url"
                riskLevel: "rest.riskLevel"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9100
      namespace: vanta-mcp
      transport: http
      tools:
        - name: list-users
          description: "List all active users in the Vanta organization"
          hints:
            readOnly: true
            openWorld: false
          call: "vanta.list-users"
          with:
            pageSize: "tools.pageSize"
          outputParameters:
            - type: object
              mapping: "$."

        - name: list-vulnerabilities
          description: "List security vulnerabilities with optional severity and status filters"
          hints:
            readOnly: true
            openWorld: false
          call: "vanta.list-vulnerabilities"
          with:
            severity: "tools.severity"
            status: "tools.status"
          outputParameters:
            - type: object
              mapping: "$."

        - name: list-controls
          description: "Query compliance controls and their status"
          hints:
            readOnly: true
            openWorld: false
          call: "vanta.list-controls"
          with:
            frameworkId: "tools.frameworkId"
            status: "tools.status"
          outputParameters:
            - type: object
              mapping: "$."

        - name: list-vendors
          description: "Query vendor security review data"
          hints:
            readOnly: true
            openWorld: false
          call: "vanta.list-vendors"
          with:
            riskLevel: "tools.riskLevel"
          outputParameters:
            - type: object
              mapping: "$."

        - name: create-vendor
          description: "Add a new vendor for security review tracking"
          hints:
            readOnly: false
            destructive: false
          call: "vanta.create-vendor"
          with:
            name: "tools.name"
            url: "tools.url"
            riskLevel: "tools.riskLevel"
          outputParameters:
            - type: object
              mapping: "$."
