naftiko: 1.0.0-alpha2
info:
  label: Vanta API — Documents
  description: 'Vanta API — Documents. 2 operations. Lead operation: List Documents. Self-contained Naftiko capability covering
    one Vanta business surface.'
  tags:
  - Vanta
  - Documents
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    VANTA_API_KEY: VANTA_API_KEY
capability:
  consumes:
  - type: http
    namespace: vanta-documents
    baseUri: https://api.vanta.com
    description: Vanta API — Documents business capability. Self-contained, no shared references.
    resources:
    - name: v1-documents
      path: /v1/documents
      operations:
      - name: listdocuments
        method: GET
        description: List Documents
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: uploaddocument
        method: POST
        description: Upload Document
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.VANTA_API_KEY}}'
  exposes:
  - type: rest
    namespace: vanta-documents-rest
    port: 8080
    description: REST adapter for Vanta API — Documents. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/v1/documents
      name: v1-documents
      description: REST surface for v1-documents.
      operations:
      - method: GET
        name: listdocuments
        description: List Documents
        call: vanta-documents.listdocuments
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: uploaddocument
        description: Upload Document
        call: vanta-documents.uploaddocument
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: vanta-documents-mcp
    port: 9090
    transport: http
    description: MCP adapter for Vanta API — Documents. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: list-documents
      description: List Documents
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: vanta-documents.listdocuments
      outputParameters:
      - type: object
        mapping: $.
    - name: upload-document
      description: Upload Document
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: vanta-documents.uploaddocument
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
