naftiko: 1.0.0-alpha2
info:
  label: Vanta API — Authentication
  description: 'Vanta API — Authentication. 1 operations. Lead operation: Get Access Token. Self-contained Naftiko capability
    covering one Vanta business surface.'
  tags:
  - Vanta
  - Authentication
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    VANTA_API_KEY: VANTA_API_KEY
capability:
  consumes:
  - type: http
    namespace: vanta-authentication
    baseUri: https://api.vanta.com
    description: Vanta API — Authentication business capability. Self-contained, no shared references.
    resources:
    - name: oauth-token
      path: /oauth/token
      operations:
      - name: getaccesstoken
        method: POST
        description: Get Access Token
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.VANTA_API_KEY}}'
  exposes:
  - type: rest
    namespace: vanta-authentication-rest
    port: 8080
    description: REST adapter for Vanta API — Authentication. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/oauth/token
      name: oauth-token
      description: REST surface for oauth-token.
      operations:
      - method: POST
        name: getaccesstoken
        description: Get Access Token
        call: vanta-authentication.getaccesstoken
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: vanta-authentication-mcp
    port: 9090
    transport: http
    description: MCP adapter for Vanta API — Authentication. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: get-access-token
      description: Get Access Token
      hints:
        readOnly: true
        destructive: false
        idempotent: false
      call: vanta-authentication.getaccesstoken
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
