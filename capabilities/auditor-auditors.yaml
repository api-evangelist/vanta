naftiko: 1.0.0-alpha2
info:
  label: Conduct an audit — Auditors
  description: 'Conduct an audit — Auditors. 1 operations. Lead operation: Create an auditor. Self-contained Naftiko capability
    covering one Vanta business surface.'
  tags:
  - Vanta
  - Auditors
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    VANTA_API_KEY: VANTA_API_KEY
capability:
  consumes:
  - type: http
    namespace: auditor-auditors
    baseUri: https://api.vanta.com/v1
    description: Conduct an audit — Auditors business capability. Self-contained, no shared references.
    resources:
    - name: auditors
      path: /auditors
      operations:
      - name: createauditor
        method: POST
        description: Create an auditor
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.VANTA_API_KEY}}'
  exposes:
  - type: rest
    namespace: auditor-auditors-rest
    port: 8080
    description: REST adapter for Conduct an audit — Auditors. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/auditors
      name: auditors
      description: REST surface for auditors.
      operations:
      - method: POST
        name: createauditor
        description: Create an auditor
        call: auditor-auditors.createauditor
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: auditor-auditors-mcp
    port: 9090
    transport: http
    description: MCP adapter for Conduct an audit — Auditors. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: create-auditor
      description: Create an auditor
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: auditor-auditors.createauditor
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
